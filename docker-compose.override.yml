# Local-machine overrides (auto-merged by `docker compose`).
#
# This Mac runs the embedder as a NATIVE MLX sidecar on :8082
# (scripts/apple_ml_services/start.sh), not as the Docker `embedder`
# profile service the base compose file points at (`http://embedder:80`,
# which doesn't resolve when the local-embed profile is off). Same
# pattern as the ghost_b_extract sidecar on :8084 — Metal is only
# available natively, never inside Linux containers.
services:
  backend:
    environment:
      EMBEDDER_URL: http://host.docker.internal:8082
      # Extraction runs on the RTX PRO 6000 box (34 ms/chunk vs the Mac's
      # 420 — unified-memory bandwidth binds DeBERTa here). If that box is
      # offline, ingestion fails loudly (no silent fallback); to fall back to
      # the Mac sidecar: comment this line out, start the local sidecar
      # (START_GHOST_B_EXTRACT=true scripts/apple_ml_services/start.sh), and
      # `docker compose up -d backend`. Queries never touch this.
      # PREFERENCE-ORDERED sidecar list spanning both machines — the client
      # health-probes each per call and uses only the live ones (multi-
      # process on Windows serializes under WDDM, so just 2 RTX instances).
      # RTX on  -> bulk extraction runs there (fast).
      # RTX off -> the Mac's own always-on sidecar (LaunchAgent
      #            com.polymath.ghostb-extract) quietly handles small
      #            batches. One config, no switching, either machine works.
      LOCAL_GHOST_B_EXTRACT_URL: http://192.168.1.83:8084,http://192.168.1.83:8085,http://host.docker.internal:8084
      # Docs in flight through extraction (default 1 serialized everything).
      # With an N-instance RTX fleet, small docs can't feed the fleet alone —
      # several docs in flight keep all instances busy while the Mac embeds
      # completed ones. Memory cost per extra doc ≈ its chunks in RAM (small).
      EXTRACTION_MAX_ACTIVE_DOCS: "4"
      # Native Qwen3-Reranker-0.6B cross-encoder (llama.cpp on Metal, :8081,
      # LaunchAgent com.polymath.reranker-qwen3) — final ranking stage of
      # retrieval (step 6). Probe quality 8/8 with 0.93+ score separation vs
      # the jina bi-encoder MLX sidecar's 4/6 (retired); 40-doc pool ≈ 1 s.
      # If unreachable, the retriever falls back to fusion score sort.
      RERANKER_URL: http://host.docker.internal:8081
      RERANKER_SCORE_SCALE: probability
