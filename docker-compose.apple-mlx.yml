# Apple Silicon (MLX) hybrid override.
#
# Why this exists: Docker Desktop on macOS cannot pass through the Apple
# GPU. Containerized embed/rerank would fall back to CPU and run 10–20×
# slower. So MLX runs HOST-NATIVE on the Mac (via launchd) and the
# Docker stack reaches it over `host.docker.internal`.
#
# Use:
#   bash scripts/setup_apple_mlx.sh
#
# Manual Docker start after host services are installed:
#   docker compose -f docker-compose.yml -f docker-compose.apple-mlx.yml up -d --build
#
# Prerequisite — host services running:
#   bash scripts/install_apple_mlx_runtime.sh
#   bash scripts/smoke_apple_mlx.sh
#
# This override:
#   * Disables the in-cluster embedder, reranker, and docling services
#     (they're replaced by host-native MLX equivalents).
#   * Points the backend at host.docker.internal:{8082,8081,8500}.
#   * Sets RERANKER_SCORE_SCALE=cosine because Jina v3 returns cosine
#     scores, not logits — without this the negative-logit "low confidence"
#     guard misclassifies every result.

services:
  # ── disable in-cluster GPU services ─────────────────────────────────
  embedder:
    profiles: ["disabled"]
  reranker:
    profiles: ["disabled"]
  docling:
    profiles: ["disabled"]

  # ── retarget backend at host services ───────────────────────────────
  backend:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      EMBEDDER_URL: http://host.docker.internal:8082
      RERANKER_URL: http://host.docker.internal:8081
      DOCLING_URL: http://host.docker.internal:8500
      RERANKER_SCORE_SCALE: cosine
      RERANKER_MODEL: mlx-community/jina-reranker-v3-4bit-mxfp4
      EMBEDDER_MODEL_NAME: Qwen3-Embedding-0.6B
      EMBED_BATCH_SIZE: ${EMBED_BATCH_SIZE:-32}
      LOCAL_EMBEDDER_ENABLED: ${LOCAL_EMBEDDER_ENABLED:-true}
      LOCAL_RERANKER_ENABLED: ${LOCAL_RERANKER_ENABLED:-true}
      # Pass-1 deterministic + Pass-2 SLM-residual enrichment (both default off).
      LOCAL_PASS1_ENRICH_ENABLED: ${LOCAL_PASS1_ENRICH_ENABLED:-false}
      LOCAL_SLM_ENRICH_ENABLED: ${LOCAL_SLM_ENRICH_ENABLED:-false}
      LOCAL_SLM_ENRICH_URL: ${LOCAL_SLM_ENRICH_URL:-http://host.docker.internal:8083}
      DOCLING_SIDECAR_POLICY: ${DOCLING_SIDECAR_POLICY:-off}
      GRAPH_CACHE_WARMUP_SKIP_DURING_ACTIVE_INGEST: ${GRAPH_CACHE_WARMUP_SKIP_DURING_ACTIVE_INGEST:-true}
      GRAPH_CACHE_WARMUP_ACTIVE_INGEST_DEFER_SECONDS: ${GRAPH_CACHE_WARMUP_ACTIVE_INGEST_DEFER_SECONDS:-120}
      EMBED_DEVICE: mps

  # MCP container also needs the embedder/reranker (same retarget).
  mcp:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      EMBEDDER_URL: http://host.docker.internal:8082
      RERANKER_URL: http://host.docker.internal:8081
      DOCLING_URL: http://host.docker.internal:8500
      RERANKER_SCORE_SCALE: cosine
      RERANKER_MODEL: mlx-community/jina-reranker-v3-4bit-mxfp4
      EMBEDDER_MODEL_NAME: Qwen3-Embedding-0.6B
      EMBED_BATCH_SIZE: ${EMBED_BATCH_SIZE:-32}
