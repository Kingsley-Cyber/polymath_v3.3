[pytest]
# Default run skips integration tests so a hermetic `pytest tests/` is green.
# Integration tests need a live Mongo / Qdrant / docling sidecar — run them with:
#   pytest -m integration              # only integration
#   pytest -m ""                       # everything (override default)
#   pytest --override-ini="addopts="   # everything (alternate override)
#
# A test is `integration` when it makes a real network call to a service from
# docker-compose (mongodb, qdrant, neo4j, docling, embedder, reranker,
# litellm, ollama). Pure unit tests, mocks, and in-process tests must NOT be
# marked integration.
markers =
    integration: requires a running docker-compose service (mongodb / docling / etc.)

addopts = -m "not integration"
