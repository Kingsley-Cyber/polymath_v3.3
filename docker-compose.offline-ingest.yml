# Offline ingestion split profile.
#
# Use this overlay when the Mac is doing large, local/offline ingestion:
#
#   docker compose \
#     -f docker-compose.yml \
#     -f docker-compose.override.yml \
#     -f docker-compose.offline-ingest.yml \
#     --profile offline-ingest up -d backend ingest-worker
#
# Contract:
#   - backend: query/API only, 6 GB cap, does not own ingest runners.
#   - ingest-worker: conditional 20 GB worker, no public port, owns durable
#     batch recovery/polling and runs memory-heavy ingest phases.
#   - local batches use the global Mac rule: one active document, staged
#     extracted/indexed/full sweeps, and bounded inner phase parallelism.
#   - increase phase knobs before increasing active documents.
#
# Docker Desktop must have enough VM memory for this to be real. Set Docker
# memory to at least 26 GiB, preferably 32+ GiB once Mongo/Qdrant/Neo4j are
# included.

services:
  backend:
    mem_limit: ${QUERY_BACKEND_MEM_LIMIT:-6g}
    environment:
      INGEST_RUNNERS_ENABLED: "false"
      INGEST_MAX_ACTIVE_JOBS: "1"
      INGEST_BATCH_WORKERS: "1"
      INGEST_GLOBAL_MAX_DOCS: "1"
      INGEST_MAX_MODEL_PHASE_DOCS: "1"
      INGEST_MAX_PARSE_JOBS: "2"

  ingest-worker:
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    build: ./backend
    profiles: ["offline-ingest"]
    mem_limit: ${INGEST_WORKER_MEM_LIMIT:-20g}
    volumes:
      - "${POLYMATH_MODELS_ROOT:-C:/PolymathRuntime/models}:/models:ro"
      - "${POLYMATH_DOCKER_DATA_ROOT:-C:/PolymathRuntime}/volumes/hf-cache:/home/appuser/.cache/huggingface"
      - "${POLYMATH_DOCKER_DATA_ROOT:-C:/PolymathRuntime}/volumes/ingest-files:/data/ingest-files"
      - "${POLYMATH_DOCKER_DATA_ROOT:-C:/PolymathRuntime}/volumes/ingest-drop-off:/data/ingest-drop-off"
      - "${POLYMATH_INGEST_SOURCE_ROOT:-C:/PolymathRuntime/ingest-source}:/ingest-source:ro"
      - "${POLYMATH_RUNTIME_BINDS_ROOT:-C:/PolymathRuntime/binds}/modal_embedder.py:/app/modal_embedder.py:ro"
    environment:
      APP_ENV: offline-ingest-worker
      MONGODB_URI: mongodb://${MONGO_USER:-polymath}:${MONGO_PASSWORD}@mongodb:27017/polymath?authSource=admin
      QDRANT_URL: http://qdrant:6333
      QDRANT_MEM_LIMIT: ${QDRANT_MEM_LIMIT:-4g}
      QDRANT_MEMORY_WARN_RATIO: ${QDRANT_MEMORY_WARN_RATIO:-0.85}
      QDRANT_MEMORY_STOP_RATIO: ${QDRANT_MEMORY_STOP_RATIO:-0.90}
      QDRANT_BINARY_QUANTIZATION_ENABLED: ${QDRANT_BINARY_QUANTIZATION_ENABLED:-true}
      QDRANT_BINARY_QUANTIZATION_ALWAYS_RAM: ${QDRANT_BINARY_QUANTIZATION_ALWAYS_RAM:-true}
      QDRANT_BINARY_QUANTIZATION_RESCORE: ${QDRANT_BINARY_QUANTIZATION_RESCORE:-true}
      QDRANT_BINARY_QUANTIZATION_OVERSAMPLING: ${QDRANT_BINARY_QUANTIZATION_OVERSAMPLING:-2.0}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      NEO4J_ENABLED: ${NEO4J_ENABLED:-false}
      LITELLM_URL: http://litellm:4000
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      OLLAMA_URL: http://host.docker.internal:11434
      REDIS_URL: redis://redis:6379
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD}
      MODELS_DIR: /models
      HF_HOME: /home/appuser/.cache/huggingface
      EMBEDDER_URL: ${OFFLINE_INGEST_EMBEDDER_URL:-http://host.docker.internal:8082}
      EMBEDDER_LOCAL_TIMEOUT_SECONDS: ${EMBEDDER_LOCAL_TIMEOUT_SECONDS:-120}
      EMBEDDER_QUERY_TIMEOUT_SECONDS: ${EMBEDDER_QUERY_TIMEOUT_SECONDS:-30}
      RERANKER_URL: ${OFFLINE_INGEST_RERANKER_URL:-http://host.docker.internal:8081}
      RERANKER_SCORE_SCALE: ${RERANKER_SCORE_SCALE:-probability}
      RERANKER_QUEUE_TIMEOUT_SECONDS: ${RERANKER_QUEUE_TIMEOUT_SECONDS:-5}
      LOCAL_EMBEDDER_ENABLED: ${LOCAL_EMBEDDER_ENABLED:-true}
      LOCAL_RERANKER_ENABLED: ${LOCAL_RERANKER_ENABLED:-false}
      MODAL_ENABLED: ${MODAL_ENABLED:-false}
      MODAL_EMBEDDER_URL: ${MODAL_EMBEDDER_URL:-}
      MODAL_API_KEY: ${MODAL_API_KEY:-}
      SILICONFLOW_ENABLED: ${SILICONFLOW_ENABLED:-false}
      SILICONFLOW_EMBEDDER_URL: ${SILICONFLOW_EMBEDDER_URL:-https://api.siliconflow.com/v1/embeddings}
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:-}
      DOCLING_URL: http://docling:8500
      DOCLING_SIDECAR_POLICY: ${DOCLING_SIDECAR_POLICY:-off}
      DOCLING_AUTO_UNLOAD_AFTER_PARSE: "true"
      INGEST_RUNNERS_ENABLED: "true"
      INGEST_RUNNER_POLL_SECONDS: ${INGEST_RUNNER_POLL_SECONDS:-10}
      INGEST_AUTO_REPAIR_ENABLED: ${INGEST_AUTO_REPAIR_ENABLED:-true}
      INGEST_AUTO_REPAIR_POLL_SECONDS: ${INGEST_AUTO_REPAIR_POLL_SECONDS:-120}
      INGEST_AUTO_REPAIR_MAX_BACKOFF_SECONDS: ${INGEST_AUTO_REPAIR_MAX_BACKOFF_SECONDS:-3600}
      INGEST_JOB_MAX_ATTEMPTS: ${INGEST_JOB_MAX_ATTEMPTS:-5}
      INGEST_PROVIDER_MICROBATCH_SIZE: ${INGEST_PROVIDER_MICROBATCH_SIZE:-4}
      INGEST_PROVIDER_MICROBATCH_MAX_CHARS: ${INGEST_PROVIDER_MICROBATCH_MAX_CHARS:-60000}
      INGEST_AUTO_REPAIR_CORPUS_LIMIT: ${INGEST_AUTO_REPAIR_CORPUS_LIMIT:-3}
      INGEST_AUTO_REPAIR_CORPUS_CONCURRENCY: ${INGEST_AUTO_REPAIR_CORPUS_CONCURRENCY:-3}
      INGEST_AUTO_REPAIR_RUN_DOCUMENT_PIPELINE: ${INGEST_AUTO_REPAIR_RUN_DOCUMENT_PIPELINE:-true}
      INGEST_AUTO_REPAIR_RUN_EXTRACTION: ${INGEST_AUTO_REPAIR_RUN_EXTRACTION:-true}
      INGEST_AUTO_REPAIR_RUN_SUMMARIES: ${INGEST_AUTO_REPAIR_RUN_SUMMARIES:-true}
      INGEST_AUTO_REPAIR_RUN_GRAPH: ${INGEST_AUTO_REPAIR_RUN_GRAPH:-true}
      INGEST_AUTO_REPAIR_DOCUMENT_RUN_LIMIT: ${INGEST_AUTO_REPAIR_DOCUMENT_RUN_LIMIT:-25}
      INGEST_AUTO_REPAIR_EXTRACTION_RUN_LIMIT: ${INGEST_AUTO_REPAIR_EXTRACTION_RUN_LIMIT:-500}
      INGEST_AUTO_REPAIR_SUMMARY_RUN_LIMIT: ${INGEST_AUTO_REPAIR_SUMMARY_RUN_LIMIT:-500}
      INGEST_AUTO_REPAIR_STAGE_IDENTITY_LIMIT: ${INGEST_AUTO_REPAIR_STAGE_IDENTITY_LIMIT:-1000}
      INGEST_AUTO_REPAIR_GRAPH_RUN_LIMIT: ${INGEST_AUTO_REPAIR_GRAPH_RUN_LIMIT:-5}
      INGEST_BACKEND_RAM_TARGET_MB: ${INGEST_WORKER_RAM_TARGET_MB:-20480}
      INGEST_MAX_PARSE_JOBS: ${OFFLINE_INGEST_MAX_PARSE_JOBS:-2}
      INGEST_MAX_MODEL_PHASE_DOCS: ${OFFLINE_INGEST_MAX_MODEL_PHASE_DOCS:-1}
      INGEST_MAX_ACTIVE_JOBS: ${OFFLINE_INGEST_MAX_ACTIVE_JOBS:-1}
      INGEST_BATCH_WORKERS: ${OFFLINE_INGEST_BATCH_WORKERS:-1}
      INGEST_GLOBAL_MAX_DOCS: ${OFFLINE_INGEST_GLOBAL_MAX_DOCS:-1}
      INGEST_EMBED_DOCS: ${OFFLINE_INGEST_EMBED_DOCS:-1}
      INGEST_CHUNK_PROCESSES: ${OFFLINE_INGEST_CHUNK_PROCESSES:-4}
      EMBED_BATCH_SIZE: ${OFFLINE_INGEST_EMBED_BATCH_SIZE:-64}
      TWO_PHASE_INGEST: ${TWO_PHASE_INGEST:-false}
      GRAPH_CACHE_WARMUP_SKIP_DURING_ACTIVE_INGEST: "true"
      GRAPH_CACHE_WARMUP_ACTIVE_INGEST_DEFER_SECONDS: ${GRAPH_CACHE_WARMUP_ACTIVE_INGEST_DEFER_SECONDS:-120}
      INGEST_FILE_STORAGE_DIR: ${INGEST_FILE_STORAGE_DIR:-/data/ingest-files}
      INGEST_DROP_OFF_DIR: ${INGEST_DROP_OFF_DIR:-/data/ingest-drop-off}
      INGEST_FILE_STORAGE_MAX_BYTES: ${INGEST_FILE_STORAGE_MAX_BYTES:-2147483648}
      RUNPOD_JOB_JOURNAL_DIR: ${RUNPOD_JOB_JOURNAL_DIR:-/data/ingest-files/runpod-job-journals}
      EXTRACTION_MAX_ACTIVE_DOCS: ${OFFLINE_EXTRACTION_MAX_ACTIVE_DOCS:-1}
      EXTRACTION_GLOBAL_MAX_CONCURRENT: ${EXTRACTION_GLOBAL_MAX_CONCURRENT:-180}
      EXTRACTION_MAX_INPUT_TOKENS: ${EXTRACTION_MAX_INPUT_TOKENS:-700}
      EXTRACTION_MAX_ENTITIES_PER_CHUNK: ${EXTRACTION_MAX_ENTITIES_PER_CHUNK:-18}
      EXTRACTION_MAX_RELATIONS_PER_CHUNK: ${EXTRACTION_MAX_RELATIONS_PER_CHUNK:-20}
      EXTRACTION_ENABLE_FACTS: ${EXTRACTION_ENABLE_FACTS:-true}
      EXTRACTION_MAX_FACTS_PER_CHUNK: ${EXTRACTION_MAX_FACTS_PER_CHUNK:-5}
      LOCAL_GHOST_B_EXTRACT_MODE: ${LOCAL_GHOST_B_EXTRACT_MODE:-auto}
      LOCAL_GHOST_B_EXTRACT_URL: ${OFFLINE_INGEST_GHOST_B_URL:-http://host.docker.internal:8084}
      LOCAL_GHOST_B_EXTRACT_TIMEOUT_S: ${LOCAL_GHOST_B_EXTRACT_TIMEOUT_S:-5400}
      LOCAL_GHOST_B_EXTRACT_SLICE: ${LOCAL_GHOST_B_EXTRACT_SLICE:-2048}
      LOCAL_GHOST_B_ALLOW_ONNX_CPU_FALLBACK: ${LOCAL_GHOST_B_ALLOW_ONNX_CPU_FALLBACK:-false}
      CHUNK_REMOTE_URLS: ${OFFLINE_INGEST_CHUNK_REMOTE_URLS:-}
    depends_on:
      mongodb:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
    restart: unless-stopped
