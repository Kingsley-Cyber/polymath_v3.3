# Polymath RAG v3.3 - Docker Compose Configuration
# All services for the hierarchical RAG system
# Persistent app data is bind-mounted to the host by default so Docker
# Desktop's WSL VHDX stays disposable. Keep this OUTSIDE Docker Desktop's own
# DataFolder. Default uses C:\PolymathRuntime because Docker Desktop can map C:
# reliably on Windows. If Docker Desktop maps your E: drive correctly, override
# with POLYMATH_DOCKER_DATA_ROOT=E:/PolymathRuntime.
#   C:\PolymathRuntime\volumes\{mongodb,qdrant,neo4j,redis,ollama,n8n,docling,hf-cache}
#   C:\PolymathRuntime\models\{Qwen3-Embedding-0.6B,Qwen3-Reranker-0.6B}
# Override with POLYMATH_DOCKER_DATA_ROOT / POLYMATH_MODELS_ROOT if needed.

# Cap container logs at 30 MB total (3 files × 10 MB) to prevent the WSL2 vhdx
# from ballooning overnight. Default JSON driver has NO rotation — without this,
# 15 chatty containers (LiteLLM, embedder, docling, backend) will fill the
# Docker virtual disk in days. Reference from every service via `<<: *default-logging`.
x-default-logging: &default-logging
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  # ============================================================
  # DATABASES
  # ============================================================

  mongodb:
    <<: *default-logging
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - "${POLYMATH_DOCKER_DATA_ROOT:-C:/PolymathRuntime}/volumes/mongodb:/data/db"
    environment:
      MONGO_INITDB_DATABASE: polymath
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-polymath}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  mongo-express:
    <<: *default-logging
    image: mongo-express
    profiles: ["admin"]
    ports:
      - "8083:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER:-polymath}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USER:-polymath}:${MONGO_PASSWORD}@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  qdrant:
    <<: *default-logging
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - "${POLYMATH_DOCKER_DATA_ROOT:-C:/PolymathRuntime}/volumes/qdrant:/qdrant/storage"
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-c",
          "exec 3<>/dev/tcp/localhost/6333 && echo -e 'GET /healthz HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q '200' <&3",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  neo4j:
    <<: *default-logging
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
    volumes:
      - "${POLYMATH_DOCKER_DATA_ROOT:-C:/PolymathRuntime}/volumes/neo4j/data:/data"
      - "${POLYMATH_DOCKER_DATA_ROOT:-C:/PolymathRuntime}/volumes/neo4j/plugins:/plugins"
      - "${POLYMATH_DOCKER_DATA_ROOT:-C:/PolymathRuntime}/volumes/neo4j/logs:/logs"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -u neo4j -p ${NEO4J_PASSWORD} 'RETURN 1' || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  redis:
    <<: *default-logging
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - "${POLYMATH_DOCKER_DATA_ROOT:-C:/PolymathRuntime}/volumes/redis:/data"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  searxng:
    <<: *default-logging
    image: searxng/searxng:latest
    ports:
      - "8080:8080"
    volumes:
      - ./searxng-settings.yml:/etc/searxng/settings.yml:ro
    environment:
      SEARXNG_BASE_URL: ${SEARXNG_BASE_URL:-http://localhost:8080/}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  redis-commander:
    <<: *default-logging
    image: rediscommander/redis-commander:latest
    profiles: ["admin"]
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8085:8081/tcp"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ============================================================
  # AI SERVICES
  # ============================================================

  ollama:
    <<: *default-logging
    image: ollama/ollama:latest
    profiles: ["local-llm"]
    # Host port 11434 is kept free for the native Windows Ollama app. The
    # compose Ollama stays reachable on the Docker network at ollama:11434
    # (backend + LiteLLM use the internal hostname). To talk to the compose
    # Ollama from the host, run `docker compose exec ollama ollama …`.
    # ports:
    #   - "11434:11434"
    volumes:
      - "${POLYMATH_DOCKER_DATA_ROOT:-C:/PolymathRuntime}/volumes/ollama:/root/.ollama"
      - "${POLYMATH_MODELS_ROOT:-C:/PolymathRuntime/models}:/models:ro"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # One-shot: pulls default models into ollama after it's healthy
  # Run manually: docker compose run --rm ollama-pull
  ollama-pull:
    image: ollama/ollama:latest
    profiles: ["setup", "local-llm"]
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "=== Pulling nomic-embed-text (768d embeddings) ==="
        ollama pull nomic-embed-text
        echo "=== Pulling qwen3:0.6b (default chat model) ==="
        ollama pull qwen3:0.6b
        echo "=== Models available ==="
        ollama list
    volumes:
      - "${POLYMATH_DOCKER_DATA_ROOT:-C:/PolymathRuntime}/volumes/ollama:/root/.ollama"
    network_mode: "service:ollama"
    depends_on:
      ollama:
        condition: service_healthy

  litellm:
    # Pinned — later LiteLLM tags (including main-stable, main-latest) require
    # a Postgres DB for master_key auth. main-v1.60.0 is pre-regression and
    # works DB-less; bump carefully only after validating master-key path.
    <<: *default-logging
    image: ghcr.io/berriai/litellm:main-v1.60.0
    ports:
      - "4000:4000"
    volumes:
      - "${POLYMATH_RUNTIME_BINDS_ROOT:-C:/PolymathRuntime/binds}/litellm/config.yaml:/app/config.yaml:ro"
    command: ["--config", "/app/config.yaml"]
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      Z_AI_API_KEY: ${Z_AI_API_KEY:-}
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      MIMO_API_KEY: ${MIMO_API_KEY:-}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:4000/')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ============================================================
  # EMBEDDER — sentence-transformers GPU service
  # Loads any HF safetensors model from MODEL_PATH — no hardcoding
  # API: POST http://embedder:80/embeddings (OpenAI-compatible)
  #      GET  http://embedder:80/info       (model name, dim, device)
  #      GET  http://embedder:80/health
  # ============================================================
  embedder:
    <<: *default-logging
    build: ./embedder
    profiles: ["local-embed"]
    ports:
      - "8082:80"
    volumes:
      - "${POLYMATH_MODELS_ROOT:-C:/PolymathRuntime/models}/Qwen3-Embedding-0.6B:/model:ro"
      - "${POLYMATH_DOCKER_DATA_ROOT:-C:/PolymathRuntime}/volumes/hf-cache:/root/.cache/huggingface"
    environment:
      HF_HOME: /root/.cache/huggingface
      # MODEL_PATH points at the HF Hub identifier — the on-disk embedder code
      # calls SentenceTransformer(MODEL_PATH) directly and the model is already
      # cached under HF_HOME from a prior session. The bind-mounted /model
      # directory is empty on this host, so passing it would fail with
      # "Unrecognized model in /model". Hitting the HF cache by identifier is
      # the working path.
      MODEL_PATH: Qwen/Qwen3-Embedding-0.6B
      MODEL_NAME: Qwen3-Embedding-0.6B
      # Keep local embedding conservative so large ingests don't starve the
      # desktop GPU. Raise LOCAL_EMBED_BATCH_SIZE only after watching nvidia-smi.
      EMBED_BATCH_SIZE: ${LOCAL_EMBED_BATCH_SIZE:-8}
      EMBED_DEVICE: cuda
      # PYTORCH_CUDA_ALLOC_CONF deliberately unset. The previous value
      # (expandable_segments:True,max_split_size_mb:128) crashed the embedder
      # on RTX PRO 6000 Blackwell (sm_120) with "CUDA driver error: unknown
      # error" inside model.to('cuda') under torch 2.11+cu128. The default
      # allocator works fine on this card; only re-enable if you've validated
      # the flags against the installed cuda runtime.
      # GPU pinning — see docling service for the rationale. CUDA_VISIBLE_DEVICES
      # is the load-bearing filter at the torch layer; PCI_BUS_ID ordering
      # makes "0" deterministically mean GPU 0.
      CUDA_DEVICE_ORDER: PCI_BUS_ID
      CUDA_VISIBLE_DEVICES: "0"
      NVIDIA_VISIBLE_DEVICES: "0"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    # Pt 9b — `autoheal=true` label tells the autoheal sidecar (below)
    # to restart this container when its healthcheck flips to unhealthy.
    # Pairs with the embedder's `/health` endpoint, which now performs a
    # real 1-token GPU forward pass on every probe and returns 503 if
    # the CUDA context is poisoned. Pre-Pt-9b the healthcheck only
    # checked `model is None`, so the container reported healthy for
    # 12+ hours while every /embeddings request returned 500.
    labels:
      autoheal: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 90s
    restart: unless-stopped

  # ============================================================
  # RERANKER — sentence-transformers cross-encoder
  # Model: Qwen/Qwen3-Reranker-0.6B by default (override RERANKER_MODEL)
  # API: POST http://reranker:8080/rerank
  # Note: llama.cpp cannot run BERT cross-encoders — custom service required
  # ============================================================
  reranker:
    <<: *default-logging
    build: ./reranker
    profiles: ["local-rerank"]
    ports:
      - "8081:8080"
    volumes:
      - "${POLYMATH_MODELS_ROOT:-C:/PolymathRuntime/models}/Qwen3-Reranker-0.6B:/model:ro"
      - "${POLYMATH_DOCKER_DATA_ROOT:-C:/PolymathRuntime}/volumes/hf-cache:/root/.cache/huggingface"
    environment:
      HF_HOME: /root/.cache/huggingface
      # Match the embedder pattern: use the HF identifier so the service can
      # load from HF_HOME even when the host bind at /model is empty/incomplete.
      RERANKER_MODEL: ${RERANKER_MODEL:-Qwen/Qwen3-Reranker-0.6B}
      MODEL_PATH: ${RERANKER_MODEL:-Qwen/Qwen3-Reranker-0.6B}
      RERANKER_DEVICE: auto
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # Pt 9b — autoheal labeled. Reranker is a GPU service vulnerable to
    # the same CUDA-context-poisoning failure mode the embedder hit
    # (RTX PRO 6000 Blackwell + torch 2.11+cu128).
    labels:
      autoheal: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # ============================================================
  # AUTOHEAL — restart-on-unhealthy sidecar
  #
  # Pt 9b — Docker's `restart: unless-stopped` policy only restarts a
  # container on process exit. It does NOT restart on `unhealthy`
  # status. Without this sidecar, a poisoned CUDA context can leave a
  # GPU service reporting unhealthy forever — the healthcheck flips
  # red but the container keeps running its dead model. autoheal
  # watches the Docker daemon's event stream and restarts every
  # container labeled `autoheal=true` whenever it goes unhealthy.
  #
  # Pairs with the improved /health endpoints on embedder + reranker
  # that now do a real GPU forward pass on every probe (so unhealthy
  # actually means unhealthy, not "server is up but model is dead").
  #
  # The mounted docker.sock gives autoheal admin rights on the local
  # daemon. Acceptable here because Polymath is single-machine local
  # infra; on a shared/cloud host this would need RBAC scoping.
  # ============================================================
  autoheal:
    image: willfarrell/autoheal:latest
    restart: always
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      # Poll interval in seconds. Lower = faster recovery, higher = lower
      # daemon load. 30s is the upstream default; reasonable for our scale.
      AUTOHEAL_INTERVAL: "30"
      # Wait this many seconds after starting a container before considering
      # it eligible for restart. Matches the longest start_period above.
      AUTOHEAL_START_PERIOD: "90"
      # Always use the local docker socket. AUTOHEAL_DEFAULT_STOP_TIMEOUT
      # is upstream's grace-period before SIGKILL during the restart.
      AUTOHEAL_DEFAULT_STOP_TIMEOUT: "20"
      DOCKER_SOCK: /var/run/docker.sock
      TZ: ${TZ:-UTC}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # ============================================================
  # DOCLING SIDECAR — IBM Docling parser with GPU layout, OCR disabled
  # API: POST http://docling:8500/parse
  # First boot downloads Docling/HF weights to host bind mounts under
  # C:/PolymathRuntime by default, so rebuilds do not bake weights into image layers.
  # ============================================================
  docling:
    <<: *default-logging
    build: ./docling_svc
    profiles: ["local-parser"]
    # Internal-only — backend reaches it on the docker network via
    # http://docling:8500. No host port; mirrors embedder/reranker pattern
    # so the parse endpoint + model weights aren't on the host network.
    expose:
      - "8500"
    volumes:
      - "${POLYMATH_DOCKER_DATA_ROOT:-C:/PolymathRuntime}/volumes/docling/models:/app/docling_models"
      - "${POLYMATH_DOCKER_DATA_ROOT:-C:/PolymathRuntime}/volumes/hf-cache:/app/hf_cache"
    environment:
      DOCLING_ARTIFACTS_PATH: /app/docling_models
      HF_HOME: /app/hf_cache
      DOCLING_OCR_ENABLED: "false"
      DOCLING_IDLE_UNLOAD_SECONDS: ${DOCLING_IDLE_UNLOAD_SECONDS:-300}
      CUDA_DEVICE_ORDER: PCI_BUS_ID
      CUDA_VISIBLE_DEVICES: "0" # RTX 3090
      NVIDIA_VISIBLE_DEVICES: "0"
      PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True,max_split_size_mb:128
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8500/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # ============================================================
  # AUTOMATION
  # ============================================================

  n8n:
    <<: *default-logging
    image: n8nio/n8n:latest
    profiles: ["automation"]
    ports:
      - "5678:5678"
    volumes:
      - "${POLYMATH_DOCKER_DATA_ROOT:-C:/PolymathRuntime}/volumes/n8n:/home/node/.n8n"
    environment:
      N8N_HOST: "0.0.0.0"
      N8N_PORT: "5678"
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://n8n:5678/
      GENERIC_TIMEZONE: UTC
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5678/healthz"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ============================================================
  # APPLICATION
  # ============================================================

  backend:
    <<: *default-logging
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - "${POLYMATH_MODELS_ROOT:-C:/PolymathRuntime/models}:/models:ro"
      - "${POLYMATH_DOCKER_DATA_ROOT:-C:/PolymathRuntime}/volumes/hf-cache:/home/appuser/.cache/huggingface"
      # Phase 22 — expose the Modal deploy factory inside the backend
      # container so /api/infrastructure/modal/deploy can import it.
      # Read-only bind; file lives at repo root for CLI-deploy compatibility.
      - "${POLYMATH_RUNTIME_BINDS_ROOT:-C:/PolymathRuntime/binds}/modal_embedder.py:/app/modal_embedder.py:ro"
    environment:
      MONGODB_URI: mongodb://${MONGO_USER:-polymath}:${MONGO_PASSWORD}@mongodb:27017/polymath?authSource=admin
      QDRANT_URL: http://qdrant:6333
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      NEO4J_ENABLED: ${NEO4J_ENABLED:-false}
      LITELLM_URL: http://litellm:4000
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      # Use the host's native Ollama (your 20 pulled models) via Docker
      # Desktop's host.docker.internal bridge. The compose Ollama container
      # is kept running but empty — it's a fallback only.
      OLLAMA_URL: http://host.docker.internal:11434
      REDIS_URL: redis://redis:6379
      RERANKER_URL: http://reranker:8080
      RERANKER_MODEL: ${RERANKER_MODEL:-Qwen/Qwen3-Reranker-0.6B}
      RERANKER_SCORE_SCALE: ${RERANKER_SCORE_SCALE:-logit}
      RERANKER_LOW_CONFIDENCE_THRESHOLD: ${RERANKER_LOW_CONFIDENCE_THRESHOLD:--2.5}
      EMBEDDER_URL: http://embedder:80
      LIVE_WEB_SEARCH_ENABLED: ${LIVE_WEB_SEARCH_ENABLED:-true}
      SEARXNG_URL: ${SEARXNG_URL:-http://searxng:8080}
      SEARXNG_ENGINES: ${SEARXNG_ENGINES:-google,bing,duckduckgo,brave}
      SEARXNG_TIMEOUT_SECONDS: ${SEARXNG_TIMEOUT_SECONDS:-6.0}
      LIVE_WEB_SEARCH_MAX_RESULTS: ${LIVE_WEB_SEARCH_MAX_RESULTS:-6}
      LIVE_WEB_SEARCH_CANDIDATE_RESULTS: ${LIVE_WEB_SEARCH_CANDIDATE_RESULTS:-15}
      LIVE_WEB_QUERY_EXPANSION_TIMEOUT_SECONDS: ${LIVE_WEB_QUERY_EXPANSION_TIMEOUT_SECONDS:-2.0}
      LIVE_WEB_SEARCH_FETCH_FULL_PAGES: ${LIVE_WEB_SEARCH_FETCH_FULL_PAGES:-true}
      OBSCURA_COMMAND: ${OBSCURA_COMMAND:-}
      OBSCURA_TIMEOUT_SECONDS: ${OBSCURA_TIMEOUT_SECONDS:-10.0}
      OBSCURA_MAX_CHARS: ${OBSCURA_MAX_CHARS:-4000}
      LOCAL_EMBEDDER_ENABLED: ${LOCAL_EMBEDDER_ENABLED:-false}
      LOCAL_RERANKER_ENABLED: ${LOCAL_RERANKER_ENABLED:-false}
      MODELS_DIR: /models
      HF_HOME: /home/appuser/.cache/huggingface
      N8N_URL: http://n8n:5678
      # Phase 14.3 — Modal cloud GPU (primary ingestion embed path; see .env.example)
      MODAL_ENABLED: ${MODAL_ENABLED:-false}
      MODAL_EMBEDDER_URL: ${MODAL_EMBEDDER_URL:-}
      MODAL_API_KEY: ${MODAL_API_KEY:-}
      MODAL_TIMEOUT_SECONDS: ${MODAL_TIMEOUT_SECONDS:-300.0}
      # SiliconFlow cloud embedding API (alternative to Modal)
      SILICONFLOW_ENABLED: ${SILICONFLOW_ENABLED:-false}
      SILICONFLOW_EMBEDDER_URL: ${SILICONFLOW_EMBEDDER_URL:-https://api.siliconflow.com/v1/embeddings}
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:-}
      SILICONFLOW_TIMEOUT_SECONDS: ${SILICONFLOW_TIMEOUT_SECONDS:-120.0}
      # Default chat model is resolved from Settings → Models / user pools.
      # Leave blank so LiteLLM/Mistral can be the active chat path without
      # making host-native Ollama a required service.
      DEFAULT_COMPLETION_MODEL: ${DEFAULT_COMPLETION_MODEL:-}
      # Phase 14.1 — Agentic mode defaults (user-overridable at runtime).
      # Leave blank unless this deployment intentionally requires Ollama.
      AGENTIC_MODE_ENABLED: ${AGENTIC_MODE_ENABLED:-false}
      AGENTIC_MODEL: ${AGENTIC_MODEL:-}
      # Phase 17 — HyDE dedicated model (cheap/fast hypothetical generator).
      HYDE_MODEL: ${HYDE_MODEL:-}
      # Auth secrets — config.py validators reject missing/empty. Set in .env;
      # the backend image built 2026-04-18 enforces these (older images didn't).
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD}
      # Public MCP URL is surfaced by /api/mcp/info for Settings -> MCP snippets.
      MCP_PUBLIC_URL: ${MCP_PUBLIC_URL:-}
      # Phase 7.6 — Docling sidecar (parser replacement for unstructured/regex)
      DOCLING_URL: http://docling:8500
      # GHOST B — 0.0 disables self-reported-confidence filter (glosses + schema
      # are the real quality levers). Raise per-model after eyeballing its distribution.
      ENTITY_CONFIDENCE_THRESHOLD: ${ENTITY_CONFIDENCE_THRESHOLD:-0.0}
      EXTRACTION_MAX_TOKENS: ${EXTRACTION_MAX_TOKENS:-6144}
      EXTRACTION_OUTPUT_MODE: ${EXTRACTION_OUTPUT_MODE:-jsonl}
      EXTRACTION_JSON_OBJECT_MAX_ENTITIES_PER_CHUNK: ${EXTRACTION_JSON_OBJECT_MAX_ENTITIES_PER_CHUNK:-8}
      EXTRACTION_JSON_OBJECT_MAX_RELATIONS_PER_CHUNK: ${EXTRACTION_JSON_OBJECT_MAX_RELATIONS_PER_CHUNK:-12}
      EXTRACTION_JSON_OBJECT_MAX_FACTS_PER_CHUNK: ${EXTRACTION_JSON_OBJECT_MAX_FACTS_PER_CHUNK:-4}
      EXTRACTION_EVIDENCE_MAX_CHARS: ${EXTRACTION_EVIDENCE_MAX_CHARS:-120}
      EXTRACTION_FACT_VALUE_MAX_CHARS: ${EXTRACTION_FACT_VALUE_MAX_CHARS:-160}
      EXTRACTION_RESCUE_MAX_TOKENS: ${EXTRACTION_RESCUE_MAX_TOKENS:-4096}
      EXTRACTION_MAX_INPUT_TOKENS: ${EXTRACTION_MAX_INPUT_TOKENS:-700}
      EXTRACTION_MAX_TOTAL_LINES: ${EXTRACTION_MAX_TOTAL_LINES:-55}
      EXTRACTION_RESCUE_MAX_TOTAL_LINES: ${EXTRACTION_RESCUE_MAX_TOTAL_LINES:-30}
      EXTRACTION_JSONL_MAX_CALLS: ${EXTRACTION_JSONL_MAX_CALLS:-2}
      EXTRACTION_FOREGROUND_MAX_CALLS: ${EXTRACTION_FOREGROUND_MAX_CALLS:-2}
      EXTRACTION_GLOBAL_MAX_CONCURRENT: ${EXTRACTION_GLOBAL_MAX_CONCURRENT:-180}
      EXTRACTION_MAX_ACTIVE_DOCS: ${EXTRACTION_MAX_ACTIVE_DOCS:-1}
      EXTRACTION_FAILURE_PAUSE_PERCENT: ${EXTRACTION_FAILURE_PAUSE_PERCENT:-25}
      EXTRACTION_FAILURE_PAUSE_MIN_CHUNKS: ${EXTRACTION_FAILURE_PAUSE_MIN_CHUNKS:-20}
      EXTRACTION_JSONL_DEBUG_RAW: ${EXTRACTION_JSONL_DEBUG_RAW:-false}
      EXTRACTION_ERROR_AUDIT_ENABLED: ${EXTRACTION_ERROR_AUDIT_ENABLED:-true}
      EXTRACTION_ERROR_AUDIT_MAX_FAILED_ATTEMPTS_PER_DOC: ${EXTRACTION_ERROR_AUDIT_MAX_FAILED_ATTEMPTS_PER_DOC:-200}
      EXTRACTION_ERROR_AUDIT_MAX_SUCCESS_ATTEMPTS_PER_DOC: ${EXTRACTION_ERROR_AUDIT_MAX_SUCCESS_ATTEMPTS_PER_DOC:-2}
      EXTRACTION_ERROR_AUDIT_RAW_FIRST_CHARS: ${EXTRACTION_ERROR_AUDIT_RAW_FIRST_CHARS:-200}
      EXTRACTION_ERROR_AUDIT_RAW_LAST_CHARS: ${EXTRACTION_ERROR_AUDIT_RAW_LAST_CHARS:-400}
      EXTRACTION_MAX_ENTITIES_PER_CHUNK: ${EXTRACTION_MAX_ENTITIES_PER_CHUNK:-18}
      EXTRACTION_MAX_RELATIONS_PER_CHUNK: ${EXTRACTION_MAX_RELATIONS_PER_CHUNK:-20}
      EXTRACTION_RESCUE_MAX_ENTITIES_PER_CHUNK: ${EXTRACTION_RESCUE_MAX_ENTITIES_PER_CHUNK:-8}
      EXTRACTION_RESCUE_MAX_RELATIONS_PER_CHUNK: ${EXTRACTION_RESCUE_MAX_RELATIONS_PER_CHUNK:-8}
      EXTRACTION_ENABLE_FACTS: ${EXTRACTION_ENABLE_FACTS:-true}
      EXTRACTION_MAX_FACTS_PER_CHUNK: ${EXTRACTION_MAX_FACTS_PER_CHUNK:-5}
      # Phase 20 ingest concurrency caps. Without these the worker falls back
      # to Pydantic defaults (1 doc through the model phase) and serializes
      # 5+ uploads even when cloud Ghost pools have headroom for parallel
      # processing. Default 8 allows the typical batch upload to fan out.
      INGEST_MAX_PARSE_JOBS: ${INGEST_MAX_PARSE_JOBS:-8}
      INGEST_MAX_MODEL_PHASE_DOCS: ${INGEST_MAX_MODEL_PHASE_DOCS:-8}
      INGEST_MAX_ACTIVE_JOBS: ${INGEST_MAX_ACTIVE_JOBS:-16}
    depends_on:
      mongodb:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      searxng:
        condition: service_started
      litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    stop_grace_period: 30s

  # ============================================================
  # MCP SIDECAR (Phase 8) — exposes the same retrieval / graph layer
  # over Model Context Protocol (streamable-HTTP) for agents:
  #   - Claude Desktop (via host-side stdio proxy → mcp.kingsleylab.xyz)
  #   - openclaw / custom agents (direct streamable-HTTP)
  # Tools are thin adapters over backend.services.* — no duplicated logic.
  # ============================================================

  mcp:
    <<: *default-logging
    profiles: ["mcp"]
    build:
      context: ./backend
      dockerfile: Dockerfile.mcp
    container_name: polymath-mcp
    ports:
      - "8765:8765"
    environment:
      # Service discovery — same hostnames the backend uses
      MONGODB_URI: mongodb://${MONGO_USER:-polymath}:${MONGO_PASSWORD}@mongodb:27017/polymath?authSource=admin
      QDRANT_URL: http://qdrant:6333
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      NEO4J_ENABLED: ${NEO4J_ENABLED:-false}
      LITELLM_URL: http://litellm:4000
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      # Same host-Ollama routing as backend (see comment above).
      OLLAMA_URL: http://host.docker.internal:11434
      REDIS_URL: redis://redis:6379
      RERANKER_URL: http://reranker:8080
      RERANKER_MODEL: ${RERANKER_MODEL:-Qwen/Qwen3-Reranker-0.6B}
      RERANKER_SCORE_SCALE: ${RERANKER_SCORE_SCALE:-logit}
      RERANKER_LOW_CONFIDENCE_THRESHOLD: ${RERANKER_LOW_CONFIDENCE_THRESHOLD:--2.5}
      EMBEDDER_URL: http://embedder:80
      # Auth — reuse the backend's JWT secret so tokens issued by /api/auth
      # validate identically here. DEFAULT_ADMIN_PASSWORD is unused by MCP at
      # runtime (only auth_service.bootstrap consumes it), but Pydantic Settings
      # requires it during config load — so we pass it through.
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD}
      # MCP-specific (Phase 8)
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8765"
      MCP_TRANSPORT: streamable-http
      MCP_REQUIRE_AUTH: ${MCP_REQUIRE_AUTH:-true}
      MCP_DEFAULT_TOP_K: ${MCP_DEFAULT_TOP_K:-5}
      MCP_PUBLIC_URL: ${MCP_PUBLIC_URL:-}
      # Static API key for system-level access (no per-user corpus scoping).
      # Tried BEFORE JWT validation via constant-time compare. Leave blank to
      # require JWT for every request. Set in .env, never commit.
      MCP_API_KEY: ${MCP_API_KEY:-}
    depends_on:
      mongodb:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    stop_grace_period: 30s

  frontend:
    <<: *default-logging
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ============================================================
  # CLOUDFLARE TUNNEL (optional)
  #
  # Cloudflare-managed ingress should point public hostnames at service
  # names on this compose network. This deployment uses flat subdomains
  # under kingsleylab.xyz:
  #   rag.kingsleylab.xyz  -> http://frontend:80    (React UI)
  #   api.kingsleylab.xyz  -> http://backend:8000   (FastAPI)
  #   mcp.kingsleylab.xyz  -> http://mcp:8765       (MCP sidecar)
  #
  # Configure the three Public Hostnames in:
  #   Cloudflare Zero Trust → Networks → Tunnels → <your tunnel>
  #     → Public Hostname → Add
  # Use http:// (not https://) because TLS terminates at Cloudflare's
  # edge; the in-network leg is plaintext.
  #
  # Start with:
  #   docker compose --profile cloudflare up -d cloudflared
  # Include --profile mcp when the tunnel has an MCP hostname (the
  # cloudflared service's depends_on uses required:false so it won't
  # block when the mcp profile is omitted).
  # ============================================================
  cloudflared:
    <<: *default-logging
    image: cloudflare/cloudflared:latest
    profiles: ["cloudflare"]
    # Locally-managed tunnel: ingress + tunnel id live in
    # ./.cloudflared/config.yml; credentials file is the JSON dropped
    # by `cloudflared tunnel create`. No connector token needed — the
    # cert.pem authenticates the daemon.
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./.cloudflared:/etc/cloudflared:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
      # Optional MCP wait. `required: false` (Compose 2.20+) means the tunnel
      # still starts when the mcp profile is OFF — but when both --profile mcp
      # and --profile cloudflare are passed together, cloudflared waits for
      # the MCP container's /health endpoint before announcing the tunnel.
      # Without this, the tunnel comes up first and mcp.<domain> returns 502
      # for a few seconds (or until the user notices the missing --profile mcp
      # and adds it).
      mcp:
        condition: service_healthy
        required: false
    restart: unless-stopped
